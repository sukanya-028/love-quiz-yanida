<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>รักเม 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+Thai:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --rose:#c9415a;
  --rose-light:#f5c6d0;
  --rose-dark:#7a1c2e;

  --cream:#fdf6f0;
  --warm:#f0e6d3;

  --text:#2c1a20;
  --muted:#7a5060;
  --border:#e8d0d8;

  --green:#2d8a4e;
  --green-light:#d4f0de;

  --angry:#8a2d2d;
  --angry-light:#f5d4d4;
}

html,body{
  min-height:100%;
  background:var(--cream);
  font-family:'Noto Serif Thai',serif;
  color:var(--text);
  overflow-x:hidden;
}

body{
  -webkit-tap-highlight-color:transparent;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:radial-gradient(circle,#e8c4cc 1px,transparent 1px);
  background-size:32px 32px;
  opacity:.25;
  pointer-events:none;
  z-index:0;
}

.petal{
  position:fixed;
  border-radius:50% 0 50% 0;
  opacity:0;
  pointer-events:none;
  z-index:1;
  animation:petalfall linear infinite;
}

@keyframes petalfall{
  0%{
    transform:translateY(-20px) rotate(0deg);
    opacity:.6;
  }
  100%{
    transform:translateY(105vh) rotate(400deg);
    opacity:0;
  }
}

.app{
  position:relative;
  z-index:2;
  max-width:560px;
  margin:0 auto;
  padding:2rem 1rem 4rem;
}

header{
  text-align:center;
  padding:2.5rem 0 2rem;
}

.header-icon{
  font-size:3.5rem;
  animation:pulse 2s ease-in-out infinite;
  display:inline-block;
  cursor:pointer;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.12)}
}

.header-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.2rem,8vw,3.4rem);
  font-weight:600;
  color:var(--rose-dark);
  margin-top:.6rem;
}

.header-sub{
  font-size:.9rem;
  color:var(--muted);
  margin-top:.5rem;
}

.progress-wrap{
  margin-bottom:1.5rem;
}

.progress-label{
  display:flex;
  justify-content:space-between;
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:.4rem;
}

.progress-bar{
  height:4px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--rose-light),var(--rose));
  border-radius:2px;
  transition:width .4s ease;
}

.question-card{
  background:#fff;
  border-radius:20px;
  border:1px solid var(--border);
  padding:2rem 1.75rem;

  box-shadow:
  0 2px 0 var(--rose-light),
  0 8px 32px rgba(180,60,80,.07);

  animation:fadeUp .4s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(18px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.q-num{
  font-family:'Cormorant Garamond',serif;
  font-size:.95rem;
  color:var(--rose);
  font-style:italic;
  margin-bottom:.35rem;
}

.q-text{
  font-size:1.08rem;
  font-weight:600;
  line-height:1.7;
  margin-bottom:1.4rem;
}

.q-img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:1.2rem;
  display:none;
}

.q-img.shown{
  display:block;
}

.choices{
  display:flex;
  flex-direction:column;
  gap:.65rem;
  margin-bottom:1.25rem;
}

.choice{
  display:flex;
  align-items:center;
  gap:.9rem;

  padding:.9rem 1rem;

  border:1.5px solid var(--border);
  border-radius:12px;

  background:#fafafa;

  cursor:pointer;
  transition:.2s;
}

.choice:hover{
  border-color:var(--rose);
  background:#fff5f7;
}

.choice.selected{
  border-color:var(--rose);
  background:#fff0f3;
  font-weight:600;
}

.choice.correct{
  border-color:var(--green);
  background:var(--green-light);
  color:var(--green);
  animation:pop .3s ease;
}

.choice.wrong{
  border-color:var(--angry);
  background:var(--angry-light);
  color:var(--angry);
}

.choice-label{
  min-width:28px;
  height:28px;

  border-radius:50%;
  border:1.5px solid var(--border);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:.8rem;
  font-weight:600;
}

.choice.selected .choice-label{
  background:var(--rose);
  border-color:var(--rose);
  color:#fff;
}

.choice.correct .choice-label{
  background:var(--green);
  border-color:var(--green);
  color:#fff;
}

.choice.wrong .choice-label{
  background:var(--angry);
  border-color:var(--angry);
  color:#fff;
}

@keyframes pop{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

.nav{
  display:flex;
  gap:.75rem;
}

.btn{
  flex:1;
  padding:.9rem 1rem;

  border-radius:12px;
  border:1px solid var(--border);

  font-family:'Noto Serif Thai',serif;
  font-size:.95rem;
  font-weight:600;

  cursor:pointer;
  transition:.2s;
}

.btn-prev{
  background:#fff;
  color:var(--muted);
}

.btn-prev:hover{
  border-color:var(--rose);
  color:var(--rose);
}

.btn-next{
  background:var(--rose);
  color:#fff;
  border-color:var(--rose);
}

.btn-next:hover{
  background:var(--rose-dark);
}

.btn:disabled{
  opacity:.35;
  pointer-events:none;
}

.result-screen{
  display:none;
  text-align:center;
  animation:fadeUp .5s ease;
}

.result-screen.show{
  display:block;
}

.result-happy,
.result-angry{
  padding:2rem 1.5rem;
  border-radius:20px;
}

.result-happy{
  background:linear-gradient(160deg,#fff0f5,var(--cream));
}

.result-angry{
  background:linear-gradient(160deg,#fff5f5,var(--cream));
}

.result-emoji{
  font-size:6rem;
  display:block;
  margin-bottom:1rem;
}

.result-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,7vw,3rem);
  font-weight:600;
  margin-bottom:.75rem;
}

.result-msg{
  color:var(--muted);
  line-height:1.7;
  margin-bottom:1rem;
}

.score-badge{
  display:inline-flex;
  align-items:baseline;
  gap:.25rem;
  margin:1rem 0;
}

.score-big{
  font-size:4.5rem;
  font-weight:600;
}

.score-total{
  font-size:1.5rem;
  color:var(--muted);
}

.time-used{
  margin-bottom:1rem;
  color:var(--rose-dark);
  font-weight:600;
}

.review-list{
  margin-top:1.5rem;
  text-align:left;
}

.review-item{
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:.75rem;
  overflow:hidden;
}

.review-q{
  padding:.6rem 1rem;
  background:var(--warm);
  font-size:.82rem;
  font-weight:600;
}

.review-body{
  padding:.8rem 1rem;
  display:flex;
  align-items:center;
  gap:.5rem;
  font-size:.9rem;
}

.review-ans{
  flex:1;
}

.badge{
  padding:.2rem .6rem;
  border-radius:20px;
  font-size:.75rem;
  font-weight:600;
}

.badge-ok{
  background:var(--green-light);
  color:var(--green);
}

.badge-no{
  background:var(--angry-light);
  color:var(--angry);
}

.qr-box{
  background:#fff;
  border-radius:16px;
  border:1px solid var(--border);
  padding:1.5rem;
  text-align:center;
  margin-top:1.5rem;
}

.qr-title{
  font-size:1.3rem;
  color:var(--rose-dark);
  margin-bottom:.4rem;
  font-weight:600;
}

.qr-sub{
  font-size:.82rem;
  color:var(--muted);
  margin-bottom:1rem;
}

.btn-restart{
  width:100%;
  margin-top:1.25rem;
  padding:.95rem;

  border:none;
  border-radius:12px;

  background:var(--rose);
  color:#fff;

  font-family:'Noto Serif Thai',serif;
  font-size:1rem;
  font-weight:600;

  cursor:pointer;
}

.btn-restart:hover{
  background:var(--rose-dark);
}
</style>
</head>

<body>

<audio id="correctSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3">
</audio>

<audio id="wrongSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3">
</audio>

<script>
const pc=['#e8b4be','#f5c6d0','#c9415a','#f0d0b0','#e8c4a0'];

for(let i=0;i<20;i++){
  const p=document.createElement('div');
  p.className='petal';

  p.style.cssText=`
    left:${Math.random()*100}vw;
    background:${pc[i%pc.length]};
    width:${7+Math.random()*9}px;
    height:${9+Math.random()*11}px;
    animation-duration:${7+Math.random()*9}s;
    animation-delay:${Math.random()*10}s;
  `;

  document.body.appendChild(p);
}
</script>

<div class="app">

<header>
<div class="header-icon" onclick="heartBurst(this)">💌</div>

<h1 class="header-title">คำถามชิวๆ😄</h1>

<p class="header-sub">
ตอบคำถามให้ถูก นะจ้าที่รัก ❤️
</p>
</header>

<div class="qr-box" style="margin-bottom:1.5rem">
<div class="qr-title">📱 แสกนเพื่อเล่น</div>

<div class="qr-sub">
ื แสกนนนนส่ง QR นี้เลยยย
</div>

<div id="qr-container"></div>

<p id="qr-url-text" style="margin-top:.7rem;font-size:.7rem;color:#777"></p>
</div>

<div id="quiz">

<div class="progress-wrap">

<div class="progress-label">
<span id="p-label"></span>
<span id="p-pct"></span>
</div>

<div class="progress-bar">
<div class="progress-fill" id="p-fill"></div>
</div>

</div>

<div class="question-card" id="q-card">

<div class="q-num" id="q-num"></div>

<div class="q-text" id="q-text"></div>

<img class="q-img" id="q-img">

<div class="choices" id="choices"></div>

<div class="nav">
<button class="btn btn-prev" id="btn-prev" onclick="go(-1)">
← ก่อนหน้า
</button>

<button class="btn btn-next" id="btn-next" onclick="go(1)">
ถัดไป →
</button>
</div>

</div>
</div>

<div class="result-screen result-happy" id="res-happy">

<div class="result-emoji">🥰</div>

<div class="result-title">เยี่ยมมากเลย!</div>

<div class="score-badge">
<div class="score-big" id="score-happy"></div>
<div class="score-total">/ 10</div>
</div>

<div class="time-used" id="time-happy"></div>

<p class="result-msg" id="msg-happy"></p>

<div class="review-list" id="review-happy"></div>

<button class="btn-restart" onclick="restart()">
🔄 เล่นอีกครั้ง
</button>

</div>

<div class="result-screen result-angry" id="res-angry">

<div class="result-emoji">😤</div>

<div class="result-title">ยังไม่ผ่านนะ!บ้า</div>

<div class="score-badge">
<div class="score-big" id="score-angry"></div>
<div class="score-total">/ 10</div>
</div>

<div class="time-used" id="time-angry"></div>

<p class="result-msg" id="msg-angry"></p>

<div class="review-list" id="review-angry"></div>

<button class="btn-restart" onclick="restart()">
🔄 ลองใหม่
</button>

</div>

</div>

<script>
const QUESTIONS = [
{
q:"ฉันชอบกินอาหารอะไรมากที่สุด?",
choices:["ส้มตำ","ข้าวผัด","ราเมน","พิซซ่า"],
answer:2,
img:""
},
{
q:"สีโปรดของฉันคืออะไร?",
choices:["แดง","ฟ้า","เขียว","ม่วง"],
answer:0,
img:""
},
{
q:"ฉันเกิดเดือนอะไร?",
choices:["มกราคม","มีนาคม","กรกฎาคม","พฤศจิกายน"],
answer:3,
img:""
},
{
q:"ฉันชอบดูหนังแนวไหนมากที่สุด?",
choices:["สยองขวัญ","โรแมนติก","แอคชั่น","ตลก"],
answer:1,
img:""
},
{
q:"สัตว์ที่ฉันชอบที่สุดคืออะไร?",
choices:["สุนัข","แมว","กระต่าย","นก"],
answer:0,
img:""
},
{
q:"ฉันชอบฟังเพลงแนวไหน?",
choices:["ป๊อป","ร็อค","R&B","เพลงไทยเดิม"],
answer:0,
img:""
},
{
q:"ถ้าให้เลือกไปเที่ยว ฉันจะเลือกที่ไหน?",
choices:["ทะเล","ภูเขา","เมืองต่างประเทศ","อยู่บ้าน"],
answer:0,
img:""
},
{
q:"เครื่องดื่มที่ฉันชอบที่สุดคืออะไร?",
choices:["กาแฟ","ชาเขียว","น้ำผลไม้","น้ำเปล่า"],
answer:0,
img:""
},
{
q:"งานอดิเรกของฉันคืออะไร?",
choices:["อ่านหนังสือ","เล่นเกม","วาดรูป","ฟังเพลง"],
answer:3,
img:""
},
{
q:"คำพูดที่ฉันชอบบอกเธอมากที่สุดคืออะไร?",
choices:["รักเธอนะ","คิดถึงเธอ","เธอสวยมาก","ทั้งหมดนั้น"],
answer:3,
img:""
}
];

QUESTIONS.sort(()=>Math.random()-0.5);

const HAPPY_MSG = [
"รักนะ จู๊บที่มามะ ❤️",
"รักนะ จู๊บที่มามะ ❤️",
"รักนะ จู๊บที่มามะ ❤️"
];

const ANGRY_MSG = [
"ฮืออออ แย่ๆ มาโดนจับนม 😤",
"ฮืออออ แย่ๆ มาโดนจับนม 😤 😠",
"ฮืออออ แย่ๆ มาโดนจับนม 😤 💢"
];

let cur=0;

let selected=new Array(QUESTIONS.length).fill(-1);

let answered=new Array(QUESTIONS.length).fill(false);

let startTime=Date.now();

function render(){

const Q=QUESTIONS[cur];

document.getElementById('q-num').textContent='ข้อที่ '+(cur+1);

document.getElementById('q-text').textContent=Q.q;

const img=document.getElementById('q-img');

if(Q.img){
  img.src=Q.img;
  img.classList.add('shown');
}else{
  img.classList.remove('shown');
}

const pct=Math.round(((cur+1)/QUESTIONS.length)*100);

document.getElementById('p-label').textContent=
'ข้อที่ '+(cur+1)+' จาก '+QUESTIONS.length;

document.getElementById('p-pct').textContent=pct+'%';

document.getElementById('p-fill').style.width=pct+'%';

document.getElementById('btn-prev').disabled=(cur===0);

const nextBtn=document.getElementById('btn-next');

nextBtn.textContent=
cur===QUESTIONS.length-1
?'ดูผลลัพธ์ ✓'
:'ถัดไป →';

nextBtn.disabled=!answered[cur];

const cDiv=document.getElementById('choices');

cDiv.innerHTML='';

['A','B','C','D'].forEach((lbl,i)=>{

const d=document.createElement('div');

d.className='choice';

if(answered[cur]){

  if(i===Q.answer){
    d.classList.add('correct');
  }

  else if(i===selected[cur] && selected[cur]!==Q.answer){
    d.classList.add('wrong');
  }

}else{

  if(selected[cur]===i){
    d.classList.add('selected');
  }

}

d.innerHTML=`
<span class="choice-label">${lbl}</span>
<span>${Q.choices[i]}</span>
`;

if(!answered[cur]){
  d.onclick=()=>pick(i);
}

cDiv.appendChild(d);

});

}

function pick(i){

selected[cur]=i;

answered[cur]=true;

if(i===QUESTIONS[cur].answer){

  document.getElementById('correctSound').play();

}else{

  document.getElementById('wrongSound').play();

}

render();

}

function go(dir){

if(dir===1 && !answered[cur]) return;

if(dir===1 && cur===QUESTIONS.length-1){
  showResult();
  return;
}

cur=Math.min(
QUESTIONS.length-1,
Math.max(0,cur+dir)
);

render();

}

function showResult(){

const score=QUESTIONS.reduce((s,q,i)=>{
  return s+(selected[i]===q.answer?1:0);
},0);

const sec=Math.floor((Date.now()-startTime)/1000);

document.getElementById('quiz').style.display='none';

const happy=score>=6;

const sid=happy?'res-happy':'res-angry';

document.getElementById(sid).classList.add('show');

document.getElementById(
'score-'+(happy?'happy':'angry')
).textContent=score;

document.getElementById(
'time-'+(happy?'happy':'angry')
).textContent='⏱ ใช้เวลา '+sec+' วินาที';

document.getElementById(
'msg-'+(happy?'happy':'angry')
).textContent=
(happy?HAPPY_MSG:ANGRY_MSG)
[Math.floor(Math.random()*3)];

const review=document.getElementById(
'review-'+(happy?'happy':'angry')
);

review.innerHTML='';

QUESTIONS.forEach((q,i)=>{

const ok=selected[i]===q.answer;

const div=document.createElement('div');

div.className='review-item';

div.innerHTML=`
<div class="review-q">
ข้อ ${i+1}: ${q.q}
</div>

<div class="review-body">

<div class="review-ans">
${ok?'✓':'✗'}
${q.choices[selected[i]]}
${ok?'':' → เฉลย: '+q.choices[q.answer]}
</div>

<div class="badge ${ok?'badge-ok':'badge-no'}">
${ok?'ถูก':'ผิด'}
</div>

</div>
`;

review.appendChild(div);

});

if(happy){
  spawnConfetti();
}else{
  spawnAngry();
}

}

function restart(){

QUESTIONS.sort(()=>Math.random()-0.5);

cur=0;

selected=new Array(QUESTIONS.length).fill(-1);

answered=new Array(QUESTIONS.length).fill(false);

startTime=Date.now();

document.getElementById('quiz').style.display='';

document.getElementById('res-happy').classList.remove('show');

document.getElementById('res-angry').classList.remove('show');

window.scrollTo(0,0);

render();

}

function heartBurst(el){

el.style.transform='scale(1.4)';

setTimeout(()=>{
  el.style.transform='';
},250);

for(let i=0;i<10;i++){

const h=document.createElement('span');

h.textContent=['❤️','💕','💖','🌹']
[Math.floor(Math.random()*4)];

const rect=el.getBoundingClientRect();

Object.assign(h.style,{
  position:'fixed',
  left:rect.left+rect.width/2+'px',
  top:rect.top+rect.height/2+'px',
  fontSize:'1.4rem',
  zIndex:999,
  pointerEvents:'none',
  transition:'1s ease',
  opacity:'1'
});

document.body.appendChild(h);

requestAnimationFrame(()=>{
requestAnimationFrame(()=>{

const dx=(Math.random()-.5)*180;
const dy=-(60+Math.random()*120);

h.style.transform=
`translate(${dx}px,${dy}px) scale(0)`;

h.style.opacity='0';

});
});

setTimeout(()=>h.remove(),1000);

}

}

function spawnConfetti(){

for(let i=0;i<30;i++){

setTimeout(()=>{

const h=document.createElement('span');

h.textContent=['❤️','💕','💖','✨','🌹']
[Math.floor(Math.random()*5)];

Object.assign(h.style,{
position:'fixed',
left:Math.random()*100+'vw',
top:'-2rem',
fontSize:'1.8rem',
zIndex:999,
pointerEvents:'none',
transition:'2s ease',
opacity:'1'
});

document.body.appendChild(h);

requestAnimationFrame(()=>{
requestAnimationFrame(()=>{

h.style.transform=
`translateY(${80+Math.random()*20}vh)
rotate(${Math.random()*360}deg)`;

h.style.opacity='0';

});
});

setTimeout(()=>h.remove(),2000);

},i*80);

}

}

function spawnAngry(){

for(let i=0;i<20;i++){

setTimeout(()=>{

const h=document.createElement('span');

h.textContent=['😤','💢','🔥','😠']
[Math.floor(Math.random()*4)];

Object.assign(h.style,{
position:'fixed',
left:Math.random()*100+'vw',
top:'-2rem',
fontSize:'1.6rem',
zIndex:999,
pointerEvents:'none',
transition:'1.5s ease',
opacity:'1'
});

document.body.appendChild(h);

requestAnimationFrame(()=>{
requestAnimationFrame(()=>{

h.style.transform=
`translateY(${80+Math.random()*20}vh)`;

h.style.opacity='0';

});
});

setTimeout(()=>h.remove(),1600);

},i*100);

}

}

function createQR(id,url,size=160){

const el=document.getElementById(id);

if(!el) return;

el.innerHTML='';

new QRCode(el,{
text:url,
width:size,
height:size,
colorDark:'#7a1c2e',
colorLight:'#ffffff',
correctLevel:QRCode.CorrectLevel.H
});

}

window.addEventListener('load',()=>{

const url=window.location.href.split('?')[0];

document.getElementById('qr-url-text').textContent=url;

createQR('qr-container',url,180);

render();

});
</script>
